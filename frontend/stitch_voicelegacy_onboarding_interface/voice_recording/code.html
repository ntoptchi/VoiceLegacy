<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VoiceLegacy - Voice Recording</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#727972",
                        "on-tertiary-fixed": "#380d00",
                        "on-background": "#1b1c1c",
                        "on-secondary-fixed": "#021e2f",
                        "tertiary-fixed": "#ffdbcf",
                        "surface-tint": "#486550",
                        "secondary-container": "#cde5fe",
                        "on-primary-fixed": "#042110",
                        "on-secondary-fixed-variant": "#32495d",
                        "primary-container": "#5f7d67",
                        "primary": "#47644f",
                        "surface-container": "#f0eded",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#eae8e7",
                        "secondary-fixed-dim": "#b1c9e1",
                        "background": "#fbf9f8",
                        "secondary": "#496175",
                        "tertiary": "#8c4c34",
                        "surface-variant": "#e4e2e1",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface": "#fbf9f8",
                        "tertiary-container": "#a9644b",
                        "inverse-on-surface": "#f2f0f0",
                        "outline-variant": "#c2c8c1",
                        "on-primary": "#ffffff",
                        "surface-bright": "#fbf9f8",
                        "inverse-surface": "#303030",
                        "inverse-primary": "#aeceb5",
                        "on-primary-fixed-variant": "#304d3a",
                        "on-tertiary-fixed-variant": "#703620",
                        "on-surface": "#1b1c1c",
                        "tertiary-fixed-dim": "#ffb59b",
                        "on-tertiary-container": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "secondary-fixed": "#cde5fe",
                        "primary-fixed": "#caebd0",
                        "on-secondary-container": "#4f677c",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dcd9d9",
                        "on-primary-container": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#aeceb5",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e4e2e1",
                        "on-surface-variant": "#424843"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "48px",
                        "base": "8px",
                        "xl": "80px",
                        "gutter": "24px",
                        "sm": "12px",
                        "margin": "32px",
                        "xs": "4px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "label-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-lg": ["16px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-sm": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["20px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-['Plus_Jakarta_Sans'] antialiased">
<!-- TopAppBar (Transactional - Hidden BottomNavBar) -->
<header class="bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-stone-200/50 dark:border-stone-800/50 flex justify-between items-center px-8 py-4 max-w-5xl mx-auto w-full">
<div class="flex items-center gap-4 w-1/3">
<button class="text-emerald-800 dark:text-emerald-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back" data-weight="fill" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
</button>
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1 rounded-full">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<span class="font-label-md text-label-md text-on-surface-variant">Recording</span>
</div>
</div>
<div class="flex flex-col items-center justify-center w-1/3 gap-1">
<h1 class="font-label-lg text-label-lg text-emerald-800 dark:text-emerald-200 tracking-tight font-semibold">3 of 8 phrases</h1>
<div class="w-full bg-surface-variant rounded-full h-1 mt-1">
<div class="bg-primary h-1 rounded-full" style="width: 37.5%"></div>
</div>
</div>
<div class="flex items-center justify-end gap-2 w-1/3">
<button class="text-emerald-800 dark:text-emerald-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="graphic_eq">graphic_eq</span>
</button>
<button class="text-emerald-800 dark:text-emerald-200 hover:bg-stone-100 dark:hover:bg-stone-800 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col justify-center items-center px-margin pt-xl pb-32 max-w-5xl mx-auto w-full relative">
<!-- Prompt Area -->
<div class="w-full max-w-3xl text-center mb-12 space-y-8">
<h2 class="font-headline-lg text-headline-lg text-on-primary-fixed-variant leading-tight">
                "It was a beautiful morning for a walk by the sea."
            </h2>
<!-- Live Transcription Box -->
<div class="bg-surface-container-low rounded-xl p-6 mx-auto max-w-2xl border border-surface-variant shadow-sm relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
<p class="font-body-md text-body-md text-on-surface-variant text-left flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-1" data-icon="notes">notes</span>
<span><span class="font-semibold text-on-surface">Transcription:</span> It was a beautiful morning...</span>
</p>
<!-- Audio Visualizer (Static mock) -->
<div class="flex items-center justify-center gap-1 mt-4 h-6 px-4">
<div class="w-1.5 h-3 bg-secondary rounded-full opacity-60"></div>
<div class="w-1.5 h-6 bg-secondary rounded-full opacity-80"></div>
<div class="w-1.5 h-4 bg-secondary rounded-full opacity-60"></div>
<div class="w-1.5 h-5 bg-secondary rounded-full opacity-70"></div>
<div class="w-1.5 h-2 bg-secondary rounded-full opacity-40"></div>
<div class="w-1.5 h-6 bg-secondary rounded-full opacity-90"></div>
<div class="w-1.5 h-3 bg-secondary rounded-full opacity-50"></div>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom Controls -->
<div class="fixed bottom-0 left-0 w-full bg-gradient-to-t from-background via-background to-transparent pt-12 pb-12 px-6 flex justify-center items-center z-40">
<div class="max-w-md w-full flex justify-between items-center">
<button class="flex flex-col items-center justify-center gap-2 text-on-surface-variant hover:text-primary transition-colors p-4 rounded-xl hover:bg-surface-container">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md">Previous</span>
</button>
<!-- Active Record Button -->
<div class="relative flex justify-center items-center">
<!-- Pulse Glow -->
<div class="absolute inset-0 bg-primary-fixed rounded-full opacity-40 scale-150 animate-pulse"></div>
<div class="absolute inset-0 bg-primary-container rounded-full opacity-20 scale-125 animate-pulse delay-75"></div>
<button class="relative w-24 h-24 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg hover:bg-on-primary-fixed-variant transition-colors active:scale-95 duration-200 border-4 border-surface z-10">
<span class="material-symbols-outlined text-4xl" data-icon="stop" data-weight="fill" style="font-variation-settings: 'FILL' 1;">stop</span>
</button>
</div>
<button class="flex flex-col items-center justify-center gap-2 text-on-surface-variant hover:text-primary transition-colors p-4 rounded-xl hover:bg-surface-container">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
<span class="font-label-md text-label-md">Next</span>
</button>
</div>
</div>
</body></html>
