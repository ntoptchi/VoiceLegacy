<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VoiceLegacy - Onboarding and Consent</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#b1c9e1",
                      "tertiary": "#8c4c34",
                      "error-container": "#ffdad6",
                      "surface-container-lowest": "#ffffff",
                      "surface-container": "#f0eded",
                      "on-primary-container": "#ffffff",
                      "background": "#fbf9f8",
                      "on-secondary": "#ffffff",
                      "on-surface": "#1b1c1c",
                      "on-tertiary-fixed-variant": "#703620",
                      "tertiary-fixed-dim": "#ffb59b",
                      "surface-container-low": "#f5f3f3",
                      "secondary-container": "#cde5fe",
                      "on-tertiary-fixed": "#380d00",
                      "on-primary-fixed": "#042110",
                      "surface-container-highest": "#e4e2e1",
                      "surface-container-high": "#eae8e7",
                      "outline": "#727972",
                      "secondary-fixed": "#cde5fe",
                      "on-tertiary-container": "#ffffff",
                      "secondary": "#496175",
                      "surface-variant": "#e4e2e1",
                      "on-error-container": "#93000a",
                      "tertiary-container": "#a9644b",
                      "inverse-on-surface": "#f2f0f0",
                      "primary-fixed": "#caebd0",
                      "surface-tint": "#486550",
                      "primary-container": "#5f7d67",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#dcd9d9",
                      "surface": "#fbf9f8",
                      "on-secondary-fixed-variant": "#32495d",
                      "outline-variant": "#c2c8c1",
                      "on-secondary-fixed": "#021e2f",
                      "on-primary": "#ffffff",
                      "primary": "#47644f",
                      "tertiary-fixed": "#ffdbcf",
                      "surface-bright": "#fbf9f8",
                      "on-primary-fixed-variant": "#304d3a",
                      "on-secondary-container": "#4f677c",
                      "primary-fixed-dim": "#aeceb5",
                      "on-surface-variant": "#424843",
                      "inverse-surface": "#303030",
                      "on-error": "#ffffff",
                      "inverse-primary": "#aeceb5",
                      "on-background": "#1b1c1c"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "lg": "48px",
                      "md": "24px",
                      "sm": "12px",
                      "xl": "80px",
                      "gutter": "24px",
                      "margin": "32px",
                      "base": "8px"
              },
              "fontFamily": {
                      "headline-lg": ["Plus Jakarta Sans"],
                      "body-sm": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "label-lg": ["Plus Jakarta Sans"],
                      "headline-sm": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"],
                      "label-md": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-lg": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-sm": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "body-md": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-md": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "label-lg": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "headline-sm": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                      "body-lg": ["20px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "label-md": ["14px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}]
              }
      },
          },
        }
      </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
      </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center py-xl px-margin antialiased">
<!-- Top Navigation Placeholder (Hidden for transactional flow as per guidelines) -->
<main class="w-full max-w-3xl flex flex-col gap-lg bg-surface-container-lowest p-lg rounded-[1.5rem] shadow-[0_4px_24px_rgba(71,100,79,0.05)] border border-outline-variant/30">
<!-- Header Section -->
<header class="flex flex-col gap-sm text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Welcome to VoiceLegacy</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">
                Preserving the voice, words, and phrases that make your communication feel personal.
            </p>
</header>
<!-- Consent Section -->
<section class="bg-surface-container-low p-md rounded-[1.5rem] flex flex-col gap-sm border border-outline-variant/50">
<div class="flex items-start gap-md">
<div class="flex-shrink-0 pt-1">
<input class="w-8 h-8 rounded-lg border-2 border-primary text-primary focus:ring-primary focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface-container-low bg-surface-container-lowest cursor-pointer transition-colors" id="consent" type="checkbox"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-headline-sm text-headline-sm text-on-surface cursor-pointer select-none" for="consent">
                        I confirm this is my voice, or I have explicit permission to preserve this voice
                    </label>
<div class="flex items-center gap-xs text-on-surface-variant mt-2">
<span class="material-symbols-outlined text-[18px]">lock</span>
<p class="font-body-sm text-body-sm">Your data is private, never shared, and can be deleted at any time.</p>
</div>
</div>
</div>
</section>
<!-- Communication Style Section -->
<section class="flex flex-col gap-md">
<h2 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant/30 pb-sm">Communication Style</h2>
<div class="flex flex-col gap-sm mt-4">
<p class="font-label-lg text-label-lg text-on-surface-variant">What is your communication tone?</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-md">
<!-- Tone Card: Warm -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="tone" type="radio" value="warm"/>
<div class="p-md bg-surface-container-lowest rounded-[1.5rem] border-2 border-outline-variant/50 peer-checked:border-primary peer-checked:bg-primary-fixed/30 hover:border-primary/50 transition-all flex flex-col items-center justify-center gap-sm text-center h-full">
<span class="material-symbols-outlined text-[32px] text-primary group-hover:scale-110 transition-transform">favorite</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Warm</span>
</div>
</label>
<!-- Tone Card: Direct -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="tone" type="radio" value="direct"/>
<div class="p-md bg-surface-container-lowest rounded-[1.5rem] border-2 border-outline-variant/50 peer-checked:border-primary peer-checked:bg-primary-fixed/30 hover:border-primary/50 transition-all flex flex-col items-center justify-center gap-sm text-center h-full">
<span class="material-symbols-outlined text-[32px] text-primary group-hover:scale-110 transition-transform">arrow_forward</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Direct</span>
</div>
</label>
<!-- Tone Card: Humorous -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="tone" type="radio" value="humorous"/>
<div class="p-md bg-surface-container-lowest rounded-[1.5rem] border-2 border-outline-variant/50 peer-checked:border-primary peer-checked:bg-primary-fixed/30 hover:border-primary/50 transition-all flex flex-col items-center justify-center gap-sm text-center h-full">
<span class="material-symbols-outlined text-[32px] text-primary group-hover:scale-110 transition-transform">sentiment_satisfied</span>
<span class="font-headline-sm text-headline-sm text-on-surface">Humorous</span>
</div>
</label>
</div>
</div>
<div class="flex flex-col gap-sm mt-lg">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="primary_audience">Who is this primarily for?</label>
<input class="w-full h-14 px-md rounded-xl border-2 border-outline-variant/50 bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:border-primary focus:ring-0 transition-colors placeholder:text-outline" id="primary_audience" placeholder="e.g., My grandchildren, my partner..." type="text"/>
</div>
</section>
<!-- Footer Actions -->
<footer class="mt-lg pt-lg border-t border-outline-variant/30 flex justify-end">
<button class="min-h-[56px] px-xl rounded-full bg-surface-variant text-on-surface-variant font-label-lg text-label-lg transition-colors opacity-70 cursor-not-allowed hover:bg-primary hover:text-on-primary" disabled="">
                Continue
            </button>
</footer>
</main>
</body></html>
